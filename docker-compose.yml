services:
  app:
    # No `build:` key on purpose — this file is the production shape, used as-is by the
    # deploy workflow's `docker compose pull/up` on the droplet. Build locally with plain
    # `docker build -t job-pilot:local .` and `export IMAGE=job-pilot:local` to run this
    # compose file against a local image instead (see .claude/skills/deploy).
    image: ${IMAGE:-job-pilot:local}
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # No domain set yet (see context/architecture.md's Hosting section) — Caddy serves
      # plain HTTP on the bare droplet IP. Set DOMAIN=yourdomain.com in .env.production once
      # DNS points at this droplet and Caddy will provision a real cert automatically.
      - DOMAIN=${DOMAIN:-:80}
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
