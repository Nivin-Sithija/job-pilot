services:
  app:
    # No `build:` key on purpose — this file is the production shape, used as-is by the
    # deploy workflow's `docker compose pull/up` on the droplet. Build locally with plain
    # `docker build -t job-pilot:local .` and `export IMAGE=job-pilot:local` to run this
    # compose file against a local image instead (see .claude/skills/deploy).
    image: ${IMAGE:-job-pilot:local}
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # DOMAIN is set in .env.production to a free nip.io hostname (64.227.162.172.nip.io,
      # resolves to the droplet IP) so Caddy provisions a real Let's Encrypt cert with no
      # purchased domain — see context/architecture.md's Hosting section. Falls back to :80
      # (plain HTTP, no cert) only if DOMAIN is unset. Swap in a real domain later, nothing
      # else changes. The deploy workflow `source`s .env.production so this interpolates.
      - DOMAIN=${DOMAIN:-:80}
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
