name: Deploy

# Runs only after CI's checks would pass on main (push trigger), never on a PR — this builds
# and ships a real image to the droplet, not something to run against unreviewed code.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      # GHCR/Docker image references must be lowercase, but github.repository preserves the
      # actual GitHub username/repo casing (e.g. "Nivin-Sithija/job-pilot") — using it directly
      # in a tag fails the build instantly with "invalid reference format". Lowercased here
      # once, into GITHUB_ENV, so every later step in this job sees the corrected value.
      - name: Compute lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set image tags
        id: meta
        run: |
          echo "image=${REGISTRY}/${IMAGE_NAME}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${REGISTRY}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.image_latest }}
          # Caches Docker layers (base image pull, npm ci, the Next.js build) in GitHub's own
          # cache backend, keyed by layer content — a push with no dependency/code change in a
          # given layer reuses it instead of re-running. The deps stage (COPY package*.json +
          # npm ci) only invalidates when package-lock.json changes, which is most pushes.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_INSFORGE_URL=${{ secrets.NEXT_PUBLIC_INSFORGE_URL }}
            NEXT_PUBLIC_INSFORGE_ANON_KEY=${{ secrets.NEXT_PUBLIC_INSFORGE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN=${{ secrets.NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    # Skips cleanly (not a failure) until the droplet exists and these repo secrets are set —
    # see .claude/skills/deploy's one-time droplet setup. Without this guard, every push to
    # main fails this job for no actionable reason before that setup is done.
    if: ${{ vars.DROPLET_READY == 'true' }}
    steps:
      # Requires repo secrets: DROPLET_HOST, DROPLET_USER, DROPLET_SSH_KEY.
      # The droplet must already have docker-compose.yml/Caddyfile/.env.production in
      # DROPLET_APP_DIR (see .claude/skills/deploy for the one-time droplet setup steps) —
      # this workflow only pulls the new image and restarts, it doesn't provision anything.
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd "${DROPLET_APP_DIR:-/opt/job-pilot}"
            # docker-compose.yml's caddy service interpolates ${DOMAIN:-:80} at compose-parse
            # time, which only sees .env.production's values if they're in the actual shell
            # environment (env_file: on the app service is a separate, container-runtime-only
            # mechanism that doesn't feed compose-file variable substitution at all).
            set -a
            source .env.production
            set +a
            export IMAGE="${{ needs.build-and-push.outputs.image }}"
            docker compose pull app
            docker compose up -d
            docker image prune -f
